spring:
  application:
    name: geekflex

  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s

  # MariaDB Settings (로컬)
  datasource:
    url: jdbc:mariadb://localhost:3306/geekflex_db
    username: geekflex_user
    password: ${GeekFlex_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  # Redis Settings (로컬)
  data:
    redis:
      host: localhost
      port: 6379
      password: ${GEEKFLEX_REDIS_PASSWORD:}
      timeout: 3000ms

  # JPA Settings
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 파일 업로드 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# Resend 이메일 설정
resend:
  api-key: ${GeekFlex_RESEND_API_KEY:re_test_key}
  from-email: "GeekFlex <onboarding@resend.dev>"

# TMDB API 설정
tmdb:
  key: ${GeekFlex_TMDB_API_KEY}
  accessToken: ${GeekFlex_TMDB_ACCESS_TOKEN}
  sync-interval: 24h  # TMDB API 재호출 주기 (이 기간 내에는 캐시된 데이터 사용)

# JWT 설정
jwt:
  secret-key: ${GeekFlex_JWT_SECRET_KEY}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
  issuer: GeekFlex

# 파일 업로드 디렉토리
file:
  upload-dir: ${GeekFlex_FILE_UPLOAD_DIR}

# 서버 설정
server:
  port: 8080
  address: 0.0.0.0

app:
  cors:
    allowed-origins: http://192.168.0.42:5037,http://192.168.50.218:5037,http://localhost:5173,http://localhost:3000,http://localhost:5037,http://192.168.50.153:8070,http://localhost:8070,http://192.168.0.42:8070,https://geekflex.vercel.app
