spring:
  application:
    name: geekflex

  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s

  # MariaDB Settings
  datasource:
    url: jdbc:mariadb://localhost:3306/geekflex_db
    username: geekflex_user
    password: ${GeekFlex_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  # Redis Settings
  data:
    redis:
      host: localhost
      port: 6379
      password: qwer3033!@
      timeout: 3000ms

  # JPA Settings
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # logging.level.org.hibernate.orm.jdbc.bind=trace

  # 파일 업로드 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: adam9e96@gmail.com
    password: ${GeekFlex_GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

    auth-code-expiration-millis: 180000

# TMDB API 설정
tmdb:
  key: ${GeekFlex_TMDB_API_KEY}
  accessToken: ${GeekFlex_TMDB_ACCESS_TOKEN}

# JWT 설정
jwt:
  secret-key: ${GeekFlex_JWT_SECRET_KEY}
  # AccessToken 만료시간 (1시간 = 3600000ms)
  access-token-expiration: 3600000
  # RefreshToken 만료시간 (7일 = 604800000ms)
  refresh-token-expiration: 604800000
  # 토큰 발급자(issuer)
  issuer: GeekFlex

# 파일 업로드 디렉토리
file:
  upload-dir: ${GeekFlex_FILE_UPLOAD_DIR}

# 서버 설정
server:
  port: 8080
  address: 0.0.0.0
