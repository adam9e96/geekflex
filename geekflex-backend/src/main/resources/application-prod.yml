spring:
  devtools:
    restart:
      enabled: false

  datasource:
    url: jdbc:mariadb://geekflex-db:3306/${GEEKFLEX_DB_NAME:geekflex_db}
    username: ${GEEKFLEX_DB_USER:geekflex_user}
    password: ${GEEKFLEX_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  data:
    redis:
      host: geekflex-redis
      port: 6379
      password: ${GEEKFLEX_REDIS_PASSWORD}
      timeout: 3000ms

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

app:
  cors:
    allowed-origins: https://geekflex.adam9e96.dev,https://geekflex.vercel.app

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
