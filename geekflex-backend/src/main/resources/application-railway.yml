spring:
  devtools:
    restart:
      enabled: false

  # MySQL Settings (Railway)
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 5000

  # Redis Settings (Railway)
  data:
    redis:
      host: ${REDISHOST}
      port: ${REDISPORT}
      password: ${REDISPASSWORD}
      timeout: 3000ms

  # JPA Settings (배포용)
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

server:
  tomcat:
    threads:
      max: 20
      min-spare: 2

app:
  logging:
    aspect:
      enabled: false
  scheduler:
    pool-size: 1

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: ERROR
    com.geekflex: ERROR
    org.springframework: ERROR
    org.hibernate: ERROR
