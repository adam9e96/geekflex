name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        working-directory: geekflex-backend
        run: chmod +x ./gradlew

      - name: Run backend tests
        working-directory: geekflex-backend
        run: ./gradlew test

  deploy:
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GEEKFLEX_VM_HOST }}
          username: ${{ secrets.GEEKFLEX_VM_USER }}
          key: ${{ secrets.GEEKFLEX_VM_SSH_KEY }}
          port: ${{ secrets.GEEKFLEX_VM_PORT }}
          script_stop: true
          script: |
            set -e
            cd /srv/docker/geekflex
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps
            for i in $(seq 1 20); do
              if docker exec portfolio-proxy-nginx wget --quiet --output-document=- --header='Host: geekflex.adam9e96.dev' http://127.0.0.1/api/health > /dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "Backend health check did not become ready in time"
                docker compose -f docker-compose.prod.yml logs --tail=200 geekflex-backend geekflex-nginx
                exit 1
              fi
              sleep 3
            done
            for i in $(seq 1 20); do
              if docker exec portfolio-proxy-nginx wget --quiet --output-document=- --header='Host: geekflex.adam9e96.dev' http://127.0.0.1/api/v1/movies/popular > /dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "API verification failed after retries"
                docker compose -f docker-compose.prod.yml logs --tail=200 geekflex-backend geekflex-nginx
                exit 1
              fi
              sleep 3
            done
            curl --fail --silent https://geekflex.adam9e96.dev/api/health > /dev/null
